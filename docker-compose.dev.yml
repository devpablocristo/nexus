services:
  nexus-core:
    build:
      context: .
      dockerfile: data-plane/Dockerfile.dev
    volumes:
      - ./data-plane:/src/data-plane
      - ./pkgs/go-pkg:/src/pkgs/go-pkg
    environment:
      NEXUS_MIGRATIONS_DIR: /src/data-plane/migrations
    command: ["sh", "-c", "go run ./cmd/migrate -cmd up && air -c .air.toml"]
    healthcheck:
      interval: 5s
      timeout: 10s
      retries: 60

  mock-tools:
    build:
      context: .
      dockerfile: data-plane/Dockerfile.dev
    volumes:
      - ./data-plane:/src/data-plane
      - ./pkgs/go-pkg:/src/pkgs/go-pkg
    command: ["air", "-c", ".air-mock-tools.toml"]

  nexus-control-operators:
    build:
      context: .
      dockerfile: control-workers/Dockerfile.dev
    volumes:
      - ./control-workers:/src/control-workers
      - ./pkgs/go-pkg:/src/pkgs/go-pkg

  nexus-saas:
    build:
      context: .
      dockerfile: control-plane/Dockerfile.dev
    volumes:
      - ./control-plane:/src/control-plane
      - ./pkgs/go-pkg:/src/pkgs/go-pkg
    environment:
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRICE_STARTER: "${STRIPE_PRICE_STARTER:-}"
      STRIPE_PRICE_GROWTH: "${STRIPE_PRICE_GROWTH:-}"
      STRIPE_PRICE_ENTERPRISE: "${STRIPE_PRICE_ENTERPRISE:-}"
      TOWER_BASE_URL: "${TOWER_BASE_URL:-http://localhost:5173}"
      NOTIFICATION_BACKEND: "${NOTIFICATION_BACKEND:-smtp}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_SES_FROM_EMAIL: "${AWS_SES_FROM_EMAIL:-}"
      AWS_SES_FROM_NAME: "${AWS_SES_FROM_NAME:-Nexus}"
      SMTP_HOST: "${SMTP_HOST:-mailhog}"
      SMTP_PORT: "${SMTP_PORT:-1025}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL:-noreply@nexus.local}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
    ports:
      - "${NEXUS_SAAS_HTTP_PORT:-8082}:8082"

  nexus-ai-operators:
    build:
      context: .
      dockerfile: ai-runtime/Dockerfile.dev
    volumes:
      - ./ai-runtime:/workspace/ai-runtime

  nexus-tower:
    build:
      context: .
      dockerfile: tower/Dockerfile.dev
    volumes:
      - ./tower:/workspace
    environment:
      VITE_NEXUS_SAAS_URL: "${VITE_NEXUS_SAAS_URL:-http://localhost:8082}"
      VITE_NEXUS_CORE_URL: "${VITE_NEXUS_CORE_URL:-http://localhost:8080}"
      VITE_NEXUS_API_KEY: "${VITE_NEXUS_API_KEY:-}"
      VITE_NEXUS_SCOPES: "${VITE_NEXUS_SCOPES:-admin:console:read,admin:console:write,audit:read}"
      VITE_CLERK_PUBLISHABLE_KEY: "${VITE_CLERK_PUBLISHABLE_KEY:-}"
    ports:
      - "${NEXUS_TOWER_PORT:-5173}:5173"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1025"]
      interval: 5s
      timeout: 3s
      retries: 3
