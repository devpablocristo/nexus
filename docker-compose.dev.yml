services:
  nexus-core:
    build:
      context: .
      dockerfile: nexus-core/Dockerfile.dev
    volumes:
      - ./nexus-core:/src
      - ./pkg:/pkg
    environment:
      NEXUS_MIGRATIONS_DIR: /src/migrations
    command: ["sh", "-c", "go run ./cmd/migrate -cmd up && air -c .air.toml"]
    healthcheck:
      interval: 5s
      timeout: 10s
      retries: 60

  mock-tools:
    build:
      context: .
      dockerfile: nexus-core/Dockerfile.dev
    volumes:
      - ./nexus-core:/src
      - ./pkg:/pkg
    command: ["air", "-c", ".air-mock-tools.toml"]

  nexus-control-operators:
    build:
      context: .
      dockerfile: nexus-control-operators/Dockerfile

  nexus-ai-operators:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./nexus-ai-operators:/workspace/nexus-ai-operators
