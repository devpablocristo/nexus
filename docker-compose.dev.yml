services:
  nexus-core:
    build:
      context: ./nexus-core
      dockerfile: Dockerfile.dev
    volumes:
      - ./nexus-core:/src
    environment:
      NEXUS_MIGRATIONS_DIR: /src/migrations
    command: ["sh", "-c", "go run ./cmd/migrate -cmd up && air -c .air.toml"]
    healthcheck:
      interval: 5s
      timeout: 10s
      retries: 60

  mock-tools:
    build:
      context: ./nexus-core
      dockerfile: Dockerfile.dev
    volumes:
      - ./nexus-core:/src
    command: ["air", "-c", ".air-mock-tools.toml"]

  nexus-control-operators:
    build:
      context: ./nexus-core
      dockerfile: Dockerfile.dev
    volumes:
      - ./nexus-core:/src
    command: ["go", "run", "./cmd/ops-workers"]

  nexus-external-operators:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./nexus-operator:/workspace/nexus-operator
    networks:
      default:
        aliases:
          - nexus-operator
