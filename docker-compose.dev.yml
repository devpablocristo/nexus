services:
  nexus-core:
    build:
      context: .
      dockerfile: nexus-core/Dockerfile.dev
    volumes:
      - ./nexus-core:/src
      - ./pkgs/go-pkg:/pkgs/go-pkg
    environment:
      NEXUS_MIGRATIONS_DIR: /src/migrations
    command: ["sh", "-c", "go run ./cmd/migrate -cmd up && air -c .air.toml"]
    healthcheck:
      interval: 5s
      timeout: 10s
      retries: 60

  mock-tools:
    build:
      context: .
      dockerfile: nexus-core/Dockerfile.dev
    volumes:
      - ./nexus-core:/src
      - ./pkgs/go-pkg:/pkgs/go-pkg
    command: ["air", "-c", ".air-mock-tools.toml"]

  nexus-control-operators:
    build:
      context: .
      dockerfile: nexus-control-operators/Dockerfile.dev
    volumes:
      - ./nexus-control-operators:/src/nexus-control-operators
      - ./pkgs/go-pkg:/src/pkgs/go-pkg

  nexus-saas:
    build:
      context: .
      dockerfile: nexus-saas/Dockerfile.dev
    volumes:
      - ./nexus-saas:/src/nexus-saas
      - ./pkgs/go-pkg:/src/pkgs/go-pkg
    ports:
      - "${NEXUS_SAAS_HTTP_PORT:-8082}:8082"

  nexus-ai-operators:
    build:
      context: .
      dockerfile: nexus-ai-operators/Dockerfile.dev
    volumes:
      - ./nexus-ai-operators:/workspace/nexus-ai-operators

  nexus-tower:
    build:
      context: .
      dockerfile: nexus-tower/Dockerfile.dev
    volumes:
      - ./nexus-tower:/workspace
    ports:
      - "${NEXUS_TOWER_PORT:-5173}:5173"
