services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: nexus
    ports:
      - "${NEXUS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus"]
      interval: 2s
      timeout: 3s
      retries: 30

  nexus-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-gateway
    environment:
      NEXUS_HTTP_PORT: "${NEXUS_HTTP_PORT:-8080}"
      NEXUS_DATABASE_URL: postgres://postgres:postgres@postgres:5432/nexus?sslmode=disable
      NEXUS_HTTP_TIMEOUT_MS: "5000"
      NEXUS_HTTP_MAX_RESPONSE_BYTES: "1048576"
      NEXUS_MAX_BODY_BYTES: "262144"
      NEXUS_LOG_LEVEL: info
      NEXUS_RATE_LIMIT_DEFAULT_PER_MINUTE: "60"
      NEXUS_SWAGGER_CDN: "${NEXUS_SWAGGER_CDN:-true}"
      NEXUS_MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${NEXUS_HTTP_PORT:-8080}:8080"
    command: ["/app/nexus-gateway"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  mock-tools:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock-tools
    ports:
      - "${NEXUS_MOCK_TOOLS_PORT:-8081}:8081"
    command: ["/app/mock-tools"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  postgres_data:
