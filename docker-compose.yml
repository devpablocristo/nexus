services:
  governance-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_governance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${GOVERNANCE_POSTGRES_PORT:-15434}:5432"
    volumes:
      - governance-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_governance"]
      interval: 2s
      timeout: 3s
      retries: 30

  governance:
    build:
      context: ./governance
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@governance-postgres:5432/nexus_governance?sslmode=disable"
      GOVERNANCE_API_KEYS: "admin=${GOVERNANCE_ADMIN_API_KEY:-governance-admin-dev-key}|service_principal=true|scopes=nexus:requests:read+nexus:requests:write+nexus:requests:result+nexus:approvals:decide+nexus:policies:admin+nexus:rbac:admin+nexus:evidence:write+nexus:dashboard:read+nexus:cross_org,prometheus=${GOVERNANCE_PROMETHEUS_API_KEY:-governance-prometheus-dev-key}|scopes=nexus:requests:read+nexus:dashboard:read,ponti=${GOVERNANCE_PONTI_API_KEY:-governance-ponti-dev-key}|service_principal=true|scopes=nexus:requests:read+nexus:requests:write+nexus:requests:result+nexus:evidence:write"
      GOVERNANCE_AUTH_ISSUER_URL: "${GOVERNANCE_AUTH_ISSUER_URL:-}"
      GOVERNANCE_AUTH_AUDIENCE: "${GOVERNANCE_AUTH_AUDIENCE:-}"
      APPROVAL_DEFAULT_TTL: "${GOVERNANCE_APPROVAL_TTL:-3600}"
      GOVERNANCE_SIGNING_KEY: "${GOVERNANCE_SIGNING_KEY:-governance-dev-signing-key-change-in-production}"
      GOVERNANCE_CALLBACK_TOKEN: "${GOVERNANCE_CALLBACK_TOKEN:-local-governance-callback-token}"
      GOVERNANCE_APPROVAL_PENDING_CALLBACK_URLS: "${GOVERNANCE_APPROVAL_PENDING_CALLBACK_URLS:-http://host.docker.internal:8100/v1/internal/v1/governance-callback}"
      GOVERNANCE_APPROVAL_RESOLVED_CALLBACK_URLS: "${GOVERNANCE_APPROVAL_RESOLVED_CALLBACK_URLS:-http://host.docker.internal:8100/v1/internal/v1/governance-callback,http://host.docker.internal:8200/v1/internal/governance-callback}"
    ports:
      - "${GOVERNANCE_PORT:-18084}:8080"
    depends_on:
      governance-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  console:
    build:
      context: ./console
    restart: unless-stopped
    environment:
      GOVERNANCE_PROXY_API_KEY: "${GOVERNANCE_ADMIN_API_KEY:-governance-admin-dev-key}"
    ports:
      - "${NEXUS_CONSOLE_PORT:-13001}:80"
    depends_on:
      governance:
        condition: service_healthy

volumes:
  governance-postgres-data:
