services:
  postgres:
    restart: unless-stopped
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: nexus
    ports:
      - "${NEXUS_POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "${NEXUS_REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  nexus-core:
    restart: unless-stopped
    build:
      context: .
      dockerfile: nexus-core/Dockerfile
    env_file:
      - .env
    environment:
      NEXUS_DATABASE_URL: "${NEXUS_DATABASE_URL}"
      NEXUS_REDIS_URL: "${NEXUS_REDIS_URL}"
      NEXUS_AI_OPERATORS_URL: "${NEXUS_AI_OPERATORS_URL}"
      NEXUS_AI_OPERATORS_INTERNAL_KEY: "${NEXUS_AI_OPERATORS_INTERNAL_KEY}"
      NEXUS_EGRESS_ALLOWLIST: "${NEXUS_EGRESS_ALLOWLIST:-mock-tools:8081}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${NEXUS_HTTP_PORT}:8080"
    command: ["sh", "-c", "/app/migrate -cmd up && /app/nexus-core"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks:
      default: {}

  mock-tools:
    restart: unless-stopped
    build:
      context: .
      dockerfile: nexus-core/Dockerfile
    depends_on:
      nexus-core:
        condition: service_started
    ports:
      - "${NEXUS_MOCK_TOOLS_PORT}:8081"
    command: ["/app/mock-tools"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  ollama:
    restart: unless-stopped
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    profiles:
      - ollama

  nexus-control-operators:
    restart: unless-stopped
    build:
      context: .
      dockerfile: nexus-control-operators/Dockerfile
    env_file:
      - .env
    environment:
      NEXUS_DATABASE_URL: "${NEXUS_DATABASE_URL}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  nexus-ai-operators:
    restart: unless-stopped
    build:
      context: .
      dockerfile: nexus-ai-operators/Dockerfile
    env_file:
      - .env
    environment:
      NEXUS_CORE_BASE_URL: "http://nexus-core:8080"
      NEXUS_CORE_API_KEY: "${NEXUS_OPERATOR_API_KEY}"
      OPERATOR_PORT: "${NEXUS_OPERATOR_PORT}"
      OPERATOR_INTERNAL_KEY: "${OPERATOR_INTERNAL_KEY}"
      LLM_BACKEND: "${LLM_BACKEND:-fallback}"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}"
    depends_on:
      nexus-core:
        condition: service_healthy
      nexus-control-operators:
        condition: service_started
    ports:
      - "${NEXUS_OPERATOR_PORT}:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  nexus-tower:
    restart: unless-stopped
    build:
      context: .
      dockerfile: nexus-tower/Dockerfile
      args:
        VITE_NEXUS_CORE_URL: "${VITE_NEXUS_CORE_URL}"
        VITE_NEXUS_AI_OPERATORS_URL: "${VITE_NEXUS_AI_OPERATORS_URL}"
        VITE_NEXUS_API_KEY: "${VITE_NEXUS_API_KEY}"
        VITE_NEXUS_SCOPES: "${VITE_NEXUS_SCOPES}"
        VITE_AI_OPERATORS_ACTION_KEY: "${VITE_AI_OPERATORS_ACTION_KEY}"
    depends_on:
      nexus-core:
        condition: service_healthy
      nexus-ai-operators:
        condition: service_healthy
    ports:
      - "${NEXUS_TOWER_PORT}:4173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    restart: unless-stopped
    image: prom/prometheus:v2.54.1
    volumes:
      - ./nexus-core/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${NEXUS_PROMETHEUS_PORT}:9090"
    depends_on:
      nexus-core:
        condition: service_started

  grafana:
    restart: unless-stopped
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./nexus-core/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./nexus-core/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./nexus-core/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${NEXUS_GRAFANA_PORT}:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:
