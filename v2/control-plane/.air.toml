root = "."
tmp_dir = "tmp"

[build]
  cmd = "CGO_ENABLED=0 go build -o ./tmp/nexus-control-plane ./cmd/api"
  bin = "./tmp/nexus-control-plane"
  full_bin = "./tmp/nexus-control-plane"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
