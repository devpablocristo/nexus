groups:
  - name: nexus-services
    rules:
      - alert: NexusServiceDown
        expr: up{job=~"nexus-(data-plane|control-plane|control-workers)"} == 0
        for: 1m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: Nexus service down
          description: "{{ $labels.job }} is not being scraped successfully."

      - alert: NexusHighErrorRate
        expr: |
          (
            sum by (job) (
              rate(nexus_http_request_errors_total{route!~"/metrics|/healthz|/readyz"}[5m])
            )
            /
            clamp_min(
              sum by (job) (
                rate(nexus_http_requests_total{route!~"/metrics|/healthz|/readyz"}[5m])
              ),
              0.001
            )
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: Nexus HTTP error rate high
          description: "{{ $labels.job }} is above 5% HTTP error rate for 5m."

      - alert: NexusHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, le) (
              rate(nexus_http_request_duration_seconds_bucket{route!~"/metrics|/healthz|/readyz"}[5m])
            )
          ) > 1
        for: 5m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: Nexus HTTP latency high
          description: "{{ $labels.job }} p95 latency is above 1s for 5m."

  - name: nexus-databases
    rules:
      - alert: NexusDatabaseDown
        expr: up{job=~"postgres-.*"} == 0 or pg_up{job=~"postgres-.*"} == 0
        for: 1m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: Nexus PostgreSQL unavailable
          description: "{{ $labels.job }} exporter or database is unavailable."
