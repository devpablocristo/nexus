global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: nexus-data-plane
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /tmp/nexus_prometheus_api_key
    static_configs:
      - targets:
          - nexus-data-plane:8080

  - job_name: nexus-control-plane
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /tmp/nexus_prometheus_api_key
    static_configs:
      - targets:
          - nexus-control-plane:8081

  - job_name: nexus-control-workers
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /tmp/nexus_prometheus_api_key
    static_configs:
      - targets:
          - nexus-control-workers:8082

  - job_name: postgres-data-plane
    static_configs:
      - targets:
          - nexus-data-plane-postgres-exporter:9187

  - job_name: postgres-control-plane
    static_configs:
      - targets:
          - nexus-control-plane-postgres-exporter:9187

  - job_name: postgres-control-workers
    static_configs:
      - targets:
          - nexus-control-workers-postgres-exporter:9187

  - job_name: postgres-audit
    static_configs:
      - targets:
          - nexus-audit-postgres-exporter:9187
