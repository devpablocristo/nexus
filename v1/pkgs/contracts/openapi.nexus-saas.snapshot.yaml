openapi: 3.0.3
info:
  title: Nexus SaaS API
  version: "1.1.0"
  description: |
    Nexus SaaS API for tenant administration, billing, incidents, actions, notifications, and assistant workflows.

    Authentication supports API key (`X-NEXUS-CORE-KEY`) and optional JWT bearer mode (`Authorization: Bearer`) for authenticated endpoints.

    Internal contract endpoints use `X-NEXUS-SAAS-KEY`.
servers:
  - url: http://localhost:8082

tags:
  - name: Health
  - name: Onboarding
  - name: Auth
  - name: Webhooks
  - name: Internal
  - name: Admin
  - name: Billing
  - name: Events
  - name: Actions
  - name: Incidents
  - name: Notifications
  - name: Alerts
  - name: Sessions
  - name: PolicyProposals
  - name: Assistant
  - name: Users
  - name: Audit
  - name: Approvals

paths:
  /health:
    get:
      tags: [Health]
      operationId: health
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatusResponse"

  /healthz:
    get:
      tags: [Health]
      operationId: healthz
      summary: Health probe
      security: []
      responses:
        "200":
          description: Health status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"

  /readyz:
    get:
      tags: [Health]
      operationId: readyz
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: Readiness status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"

  /openapi.yaml:
    get:
      tags: [Health]
      operationId: openapiSpec
      summary: OpenAPI YAML
      security: []
      responses:
        "200":
          description: OpenAPI document.

  /docs:
    get:
      tags: [Health]
      operationId: swaggerDocs
      summary: Swagger UI page
      security: []
      responses:
        "200":
          description: Swagger UI HTML.

  /v1/orgs:
    post:
      tags: [Onboarding]
      operationId: createOrg
      summary: Create or upsert organization and bootstrap API key
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgRequest"
      responses:
        "201":
          description: Organization created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrgResponse"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/oidc/config:
    get:
      tags: [Auth]
      operationId: oidcConfig
      summary: OIDC configuration status
      security: []
      responses:
        "200":
          description: OIDC config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OIDCConfigResponse"

  /v1/auth/oidc/authorize:
    get:
      tags: [Auth]
      operationId: oidcAuthorize
      summary: Start OIDC authorization code + PKCE flow
      security: []
      responses:
        "302":
          description: Redirect to OIDC provider authorization URL.
        "500":
          description: Failed to start flow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/oidc/callback:
    get:
      tags: [Auth]
      operationId: oidcCallback
      summary: Handle OIDC callback
      security: []
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
        - name: error_description
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Callback handled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OIDCCallbackResponse"
        "400":
          description: Invalid callback parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Token verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream OIDC provider error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/webhooks/clerk:
    post:
      tags: [Webhooks]
      operationId: clerkWebhook
      summary: Receive Clerk Svix webhook events
      security: []
      parameters:
        - $ref: "#/components/parameters/SvixID"
        - $ref: "#/components/parameters/SvixTimestamp"
        - $ref: "#/components/parameters/SvixSignature"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClerkWebhookEnvelope"
      responses:
        "200":
          description: Webhook processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAckResponse"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid signature.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Webhook rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Webhook secret not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/webhooks/stripe:
    post:
      tags: [Webhooks]
      operationId: stripeWebhook
      summary: Receive Stripe webhook events
      security: []
      parameters:
        - $ref: "#/components/parameters/StripeSignature"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAckResponse"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid webhook signature.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed processing event.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe integration not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /internal/usage/events:
    post:
      tags: [Internal]
      operationId: ingestUsageEvent
      summary: Increment usage counter from internal services
      security:
        - NexusSaaSInternalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalUsageEventRequest"
      responses:
        "202":
          description: Event accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OKResponse"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid internal key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Internal key not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /internal/events:
    post:
      tags: [Internal]
      operationId: ingestOperationalEvent
      summary: Append operational event from internal services
      security:
        - NexusSaaSInternalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalOperationalEventRequest"
      responses:
        "202":
          description: Event accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OKResponse"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid internal key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /internal/entitlements/{org_id}:
    get:
      tags: [Internal]
      operationId: getInternalEntitlements
      summary: Resolve plan and hard limits for an org
      security:
        - NexusSaaSInternalKey: []
      parameters:
        - $ref: "#/components/parameters/OrgIDPath"
      responses:
        "200":
          description: Entitlements payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalEntitlementsResponse"
        "400":
          description: Invalid org_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid internal key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /internal/assistant/context/{org_id}:
    get:
      tags: [Internal]
      operationId: getAssistantContext
      summary: Build redacted assistant context snapshot for an org
      security:
        - NexusSaaSInternalKey: []
      parameters:
        - $ref: "#/components/parameters/OrgIDPath"
      responses:
        "200":
          description: Assistant context snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAssistantContextResponse"
        "400":
          description: Invalid org_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid internal key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Assistant context unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /internal/runtime-overrides/{org_id}/{tool_name}:
    get:
      tags: [Internal]
      operationId: getRuntimeOverrides
      summary: Resolve runtime overrides from active actions
      security:
        - NexusSaaSInternalKey: []
      parameters:
        - $ref: "#/components/parameters/OrgIDPath"
        - $ref: "#/components/parameters/ToolNamePath"
      responses:
        "200":
          description: Runtime overrides.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalRuntimeOverridesResponse"
        "400":
          description: Invalid params.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid internal key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Actions service unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/bootstrap:
    get:
      tags: [Admin]
      operationId: getAdminBootstrap
      summary: Admin bootstrap data for authenticated org context
      security:
        - NexusApiKey: []
        - BearerAuth: []
      responses:
        "200":
          description: Bootstrap payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBootstrapResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/tenant-settings:
    get:
      tags: [Admin]
      operationId: getAdminTenantSettings
      summary: Get tenant settings
      security:
        - NexusApiKey: []
        - BearerAuth: []
      responses:
        "200":
          description: Tenant settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantSettings"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Admin]
      operationId: upsertAdminTenantSettings
      summary: Update plan and hard limits
      security:
        - NexusApiKey: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertTenantSettingsRequest"
      responses:
        "200":
          description: Updated tenant settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantSettings"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing write permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/activity:
    get:
      tags: [Admin]
      operationId: getAdminActivity
      summary: List admin activity events
      security:
        - NexusApiKey: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Activity list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActivityResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/billing/status:
    get:
      tags: [Billing]
      operationId: getBillingStatus
      summary: Current billing status for org
      security:
        - NexusApiKey: []
        - BearerAuth: []
      responses:
        "200":
          description: Billing status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStatusResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe is disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/billing/checkout:
    post:
      tags: [Billing]
      operationId: createBillingCheckout
      summary: Create Stripe checkout session
      security:
        - NexusApiKey: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCheckoutRequest"
      responses:
        "200":
          description: Checkout URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing write permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe is disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/billing/portal:
    post:
      tags: [Billing]
      operationId: createBillingPortal
      summary: Create Stripe customer portal session
      security:
        - NexusApiKey: []
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingPortalRequest"
      responses:
        "200":
          description: Portal URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalResponse"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing write permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe is disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/billing/usage:
    get:
      tags: [Billing]
      operationId: getBillingUsage
      summary: Current period usage counters
      security:
        - NexusApiKey: []
        - BearerAuth: []
      responses:
        "200":
          description: Usage summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageSummaryResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe is disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/events:
    get:
      tags: [Events]
      operationId: listEvents
      summary: List events by cursor
      security:
        - NexusApiKey: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Event list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventsResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing audit read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/actions/apply:
    post:
      tags: [Actions]
      operationId: applyAction
      summary: Apply mitigation/remediation action
      security:
        - NexusApiKey: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyActionRequest"
      responses:
        "201":
          description: Action applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing write permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/actions/rollback:
    post:
      tags: [Actions]
      operationId: rollbackAction
      summary: Roll back action by ID
      security:
        - NexusApiKey: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackActionRequest"
      responses:
        "200":
          description: Action rolled back.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing write permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/actions:
    get:
      tags: [Actions]
      operationId: listActions
      summary: List actions with optional status/action_type filter
      security:
        - NexusApiKey: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/ActionTypeQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Action list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListActionsResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/incidents:
    post:
      tags: [Incidents]
      operationId: createIncident
      summary: Create incident
      security:
        - NexusApiKey: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentRequest"
      responses:
        "201":
          description: Incident created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentItem"
        "400":
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing write permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [Incidents]
      operationId: listIncidents
      summary: List incidents
      security:
        - NexusApiKey: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Incident list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIncidentsResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/incidents/{id}:
    get:
      tags: [Incidents]
      operationId: getIncidentByID
      summary: Get incident by ID
      security:
        - NexusApiKey: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IncidentIDPath"
      responses:
        "200":
          description: Incident detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentItem"
        "400":
          description: Invalid ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Incident not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/incidents/{id}/close:
    post:
      tags: [Incidents]
      operationId: closeIncident
      summary: Close incident
      security:
        - NexusApiKey: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IncidentIDPath"
      responses:
        "200":
          description: Incident closed.
          content:
