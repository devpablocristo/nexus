components:
  securitySchemes:
    NexusApiKey:
      type: apiKey
      in: header
      name: X-NEXUS-CORE-KEY
      description: Tenant API key used by gateway and proxied SaaS endpoints.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT auth mode backed by configured issuer/JWKS.
    NexusSaaSInternalKey:
      type: apiKey
      in: header
      name: X-NEXUS-SAAS-KEY
      description: Internal service-to-service key for `/internal/*` contracts.

  parameters:
    SvixID:
      name: svix-id
      in: header
      required: true
      schema:
        type: string
    SvixTimestamp:
      name: svix-timestamp
      in: header
      required: true
      schema:
        type: string
    SvixSignature:
      name: svix-signature
      in: header
      required: true
      schema:
        type: string
    StripeSignature:
      name: Stripe-Signature
      in: header
      required: true
      schema:
        type: string
    OrgIDPath:
      name: org_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ToolNamePath:
      name: tool_name
      in: path
      required: true
      schema:
        type: string
    IncidentIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProposalIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AlertRuleIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionIDPath:
      name: session_id
      in: path
      required: true
      schema:
        type: string
    APIKeyIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: integer
        format: int64
        default: 0
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 100
    StatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
    ActionTypeQuery:
      name: action_type
      in: query
      required: false
      schema:
        type: string

  schemas:
    ErrorObject:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required: [code, message]

    ErrorResponse:
      type: object
      properties:
        request_id:
          type: string
        error:
          $ref: "#/components/schemas/ErrorObject"
      required: [error]

    HealthStatusResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]

    HealthReadyResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    OKResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    StatusOKResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required: [status]

    DeleteStatusResponse:
      type: object
      properties:
        status:
          type: string
          example: deleted
      required: [status]

    StringMap:
      type: object
      additionalProperties:
        type: string

    AnyMap:
      type: object
      additionalProperties: true

    CreateOrgRequest:
      type: object
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
      required: [name]

    CreateOrgResponse:
      type: object
      properties:
        org_id:
          type: string
          format: uuid
        api_key:
          type: string
        name:
          type: string
      required: [org_id, api_key, name]

    OIDCConfigResponse:
      type: object
      properties:
        oidc_enabled:
          type: boolean
        issuer_url:
          type: string
        scopes:
          type: array
          items:
            type: string
      required: [oidc_enabled]

    OIDCCallbackResponse:
      type: object
      properties:
        auth_method:
          type: string
        id_token:
          type: string
        access_token:
          type: string
        expires_in:
          type: integer
        org_id:
          type: string
          format: uuid
        actor:
          type: string
        role:
          type: string
        scopes:
          type: array
          items:
            type: string
        claims:
          type: object
          additionalProperties: true
        warning:
          type: string
      required: [auth_method]

    ClerkWebhookEnvelope:
      type: object
      properties:
        type:
          type: string
        data:
          type: object
          additionalProperties: true
      required: [type, data]

    WebhookAckResponse:
      type: object
      properties:
        ok:
