# ============================================================================
# Nexus - Production Docker Compose
# ============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Requires a .env file (see .env.example for reference).
# This file excludes dev-only services: mock-tools, prometheus, grafana.
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL - Internal only (no host port exposure)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${NEXUS_POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${NEXUS_POSTGRES_USER:-postgres}
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - nexus-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    shm_size: 256m

  # --------------------------------------------------------------------------
  # Redis - Internal only (no host port exposure)
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - nexus-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Nexus Core (Go API gateway)
  # --------------------------------------------------------------------------
  nexus-core:
    build:
      context: ./nexus-core
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NEXUS_DATABASE_URL: "${NEXUS_DATABASE_URL}"
      NEXUS_REDIS_URL: "${NEXUS_REDIS_URL}"
      NEXUS_OPERATOR_URL: "${NEXUS_OPERATOR_URL}"
      NEXUS_OPERATOR_INTERNAL_KEY: "${NEXUS_OPERATOR_INTERNAL_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${NEXUS_HTTP_PORT}:8080"
    command: ["sh", "-c", "/app/migrate -cmd up && /app/nexus-core"]
    read_only: true
    tmpfs:
      - /tmp:size=128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      nexus-net:
        aliases:
          - nexus-gateway
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

  # --------------------------------------------------------------------------
  # Nexus Operator (Python anomaly detection / auto-actions)
  # --------------------------------------------------------------------------
  nexus-operator:
    build:
      context: .
      dockerfile: nexus-operator/Dockerfile
    env_file:
      - .env
    environment:
      NEXUS_CORE_BASE_URL: "http://nexus-core:8080"
      NEXUS_CORE_API_KEY: "${NEXUS_CORE_API_KEY}"
      OPERATOR_PORT: "${NEXUS_OPERATOR_PORT}"
      OPERATOR_INTERNAL_KEY: "${OPERATOR_INTERNAL_KEY}"
    depends_on:
      nexus-core:
        condition: service_healthy
    ports:
      - "${NEXUS_OPERATOR_PORT}:8000"
    tmpfs:
      - /tmp:size=128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - nexus-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

  # --------------------------------------------------------------------------
  # Nexus Tower (Vite + Nginx static UI)
  # --------------------------------------------------------------------------
  nexus-tower:
    build:
      context: .
      dockerfile: nexus-tower/Dockerfile
      args:
        VITE_NEXUS_CORE_URL: "${VITE_NEXUS_CORE_URL}"
        VITE_NEXUS_OPERATOR_URL: "${VITE_NEXUS_OPERATOR_URL}"
        VITE_NEXUS_API_KEY: "${VITE_NEXUS_API_KEY}"
        VITE_NEXUS_SCOPES: "${VITE_NEXUS_SCOPES}"
        VITE_OPERATOR_ACTION_KEY: "${VITE_OPERATOR_ACTION_KEY}"
    depends_on:
      nexus-core:
        condition: service_healthy
      nexus-operator:
        condition: service_healthy
    ports:
      - "${NEXUS_TOWER_PORT}:4173"
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /var/cache/nginx:size=64M
      - /run:size=16M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4173/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - nexus-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
  redis_data:

# ============================================================================
# Networks
# ============================================================================
networks:
  nexus-net:
    driver: bridge
