<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .Title }}</title>
  </head>
  <body style="margin:0;padding:0;background:#f1f4fa;color:#0b1220;font-family:Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#ffffff;border:1px solid #dbe4f3;border-radius:12px;padding:28px;">
            <tr>
              <td>
                <p style="margin:0 0 12px;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#4b6ca6;">N E X U S</p>
                <h1 style="margin:0 0 16px;font-size:24px;line-height:1.2;color:#0b1220;">{{ .Title }}</h1>
                <p style="margin:0 0 18px;font-size:15px;line-height:1.6;color:#273958;">{{ .Message }}</p>
                {{ if .ActionURL }}
                <p style="margin:0 0 24px;">
                  <a href="{{ .ActionURL }}" style="display:inline-block;background:#2f4a78;color:#ffffff;text-decoration:none;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:600;">{{ .ActionLabel }}</a>
                </p>
                {{ end }}
                <hr style="border:none;border-top:1px solid #dbe4f3;margin:0 0 14px;" />
                <p style="margin:0 0 6px;font-size:12px;line-height:1.5;color:#5c7095;">
                  Nexus - You're receiving this because you're a member of {{ .OrgName }}.
                </p>
                <p style="margin:0;font-size:12px;line-height:1.5;">
                  <a href="{{ .PreferencesURL }}" style="color:#4b6ca6;text-decoration:none;">Manage preferences</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
