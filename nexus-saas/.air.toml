root = "."
tmp_dir = "tmp"

[build]
  cmd = "CGO_ENABLED=0 go build -o ./tmp/nexus-saas ./cmd/nexus-saas"
  bin = "./tmp/nexus-saas"
  full_bin = "./tmp/nexus-saas"
  include_ext = ["go", "sql"]
  exclude_dir = ["tmp", "vendor", "docs", "monitoring"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true

