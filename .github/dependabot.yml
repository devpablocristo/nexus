version: 2
updates:
  - package-ecosystem: gomod
    directory: /data-plane
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /control-plane
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /control-workers
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /pkgs/go-pkg
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /ai-runtime
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /tower
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /data-plane
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /control-plane
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /tower
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /ai-runtime
    schedule:
      interval: monthly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
