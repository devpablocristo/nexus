# `v3` es la unica linea activa en este repo.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /v3/review
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      go-mod:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /v3/companion
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      go-mod-companion:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /v3/console
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      npm:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /v3/review
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      docker-review:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /v3/companion
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      docker-companion:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /v3/console
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      docker-console:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
