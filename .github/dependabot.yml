# Grupos reducen ruido: un PR por grupo en vez de uno por directorio.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /data-plane
    schedule:
      interval: weekly
    group: go-mod

  - package-ecosystem: gomod
    directory: /control-plane
    schedule:
      interval: weekly
    group: go-mod

  - package-ecosystem: gomod
    directory: /control-workers
    schedule:
      interval: weekly
    group: go-mod

  - package-ecosystem: gomod
    directory: /pkgs/go-pkg
    schedule:
      interval: weekly
    group: go-mod

  - package-ecosystem: pip
    directory: /ai-runtime
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: /tower
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /data-plane
    schedule:
      interval: monthly
    group: docker

  - package-ecosystem: docker
    directory: /control-plane
    schedule:
      interval: monthly
    group: docker

  - package-ecosystem: docker
    directory: /tower
    schedule:
      interval: monthly
    group: docker

  - package-ecosystem: docker
    directory: /ai-runtime
    schedule:
      interval: monthly
    group: docker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
