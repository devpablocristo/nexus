name: monorepo-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nexus-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Docker build (verify only)
        run: docker build -t nexus-core:ci .

  nexus-control-operators:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-control-operators
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Docker build (verify only)
        run: docker build -t nexus-control-operators:ci .

  nexus-ai-operators:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-ai-operators
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy app/
      - name: Test
        run: pytest -q

  nexus-tower:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-tower
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build (verify production build)
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [nexus-core, nexus-control-operators, nexus-ai-operators, nexus-tower]
    steps:
      - uses: actions/checkout@v4
      - name: Create .env from example
        run: cp .env.example .env
      - name: Build all images via docker compose
        run: docker compose build

  e2e:
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Create .env from example
        run: cp .env.example .env
      - name: Run e2e tests
        run: make e2e
      - name: Run JWT e2e tests
        run: make jwt-e2e
      - name: Cleanup
        if: always()
        run: docker compose down -v || true
