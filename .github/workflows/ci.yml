name: monorepo-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  nexus-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Test nexus-core
        run: |
          cd nexus-core
          go test ./...

  nexus-operator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test nexus-operator
        run: |
          cd nexus-operator
          python -m venv .venv
          . .venv/bin/activate
          pip install -e '.[dev]'
          pytest -q

  nexus-tower:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Test nexus-tower
        run: |
          cd nexus-tower
          npm install
          npm run qa
