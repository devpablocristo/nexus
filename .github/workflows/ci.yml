name: CI

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/ci.yml"
      - "governance/**"
      - "console/**"
      - "scripts/**"
      - "Makefile"
      - "docker-compose.yml"
      - ".env.example"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "governance/**"
      - "console/**"
      - "scripts/**"
      - "Makefile"
      - "docker-compose.yml"
      - ".env.example"

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  governance:
    name: governance tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout nexus
        uses: actions/checkout@v5
        with:
          path: nexus

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: nexus/governance/go.mod
          cache-dependency-path: nexus/governance/go.sum

      - name: Run go test
        working-directory: nexus/governance
        run: go test ./...

      - name: Run go vet
        working-directory: nexus/governance
        run: go vet ./...

      - name: Check migration versions
        working-directory: nexus
        run: bash scripts/quality/check-migrations.sh

      - name: Check no AI runtime in Nexus
        working-directory: nexus
        run: bash scripts/quality/check-no-ai-runtime.sh

  console:
    name: console checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout nexus
        uses: actions/checkout@v5
        with:
          path: nexus

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: nexus/console/.nvmrc
          cache: npm
          cache-dependency-path: nexus/console/package-lock.json

      - name: Install deps
        working-directory: nexus/console
        run: npm ci

      - name: Typecheck console
        working-directory: nexus/console
        run: npm run typecheck

      - name: Build console
        working-directory: nexus/console
        run: npm run build

  smoke:
    name: smoke
    runs-on: ubuntu-latest
    needs:
      - governance
      - console
    timeout-minutes: 25
    steps:
      - name: Checkout nexus
        uses: actions/checkout@v5
        with:
          path: nexus

      - name: Prepare env
        working-directory: nexus
        run: test -f .env || cp .env.example .env

      - name: Validate compose model
        working-directory: nexus
        run: docker compose config --services

      - name: Start governance stack
        working-directory: nexus
        run: docker compose up -d --build governance-postgres governance

      - name: Run smoke suite
        working-directory: nexus
        run: make smoke

      - name: Capture compose logs
        if: always()
        working-directory: nexus
        run: docker compose logs --no-color > smoke-docker-compose.log

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-docker-compose-logs
          path: nexus/smoke-docker-compose.log

      - name: Tear down stack
        if: always()
        working-directory: nexus
        run: docker compose down -v --remove-orphans
