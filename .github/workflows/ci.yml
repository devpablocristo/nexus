name: monorepo-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nexus-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet
        run: go vet ./...
        working-directory: nexus-core
      - name: Test
        run: go test ./...
        working-directory: nexus-core
      - name: Docker build (verify only)
        run: docker build -f nexus-core/Dockerfile -t nexus-core:ci .

  nexus-saas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet
        run: go vet ./...
        working-directory: nexus-saas
      - name: Test
        run: go test ./...
        working-directory: nexus-saas
      - name: Docker build (verify only)
        run: docker build -f nexus-saas/Dockerfile -t nexus-saas:ci .

  nexus-control-operators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet
        run: go vet ./...
        working-directory: nexus-control-operators
      - name: Test
        run: go test ./...
        working-directory: nexus-control-operators
      - name: Docker build (verify only)
        run: docker build -f nexus-control-operators/Dockerfile -t nexus-control-operators:ci .

  nexus-ai-operators:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-ai-operators
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy app/
      - name: Test
        run: pytest -q

  nexus-tower:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-tower
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build (verify production build)
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Go vulnerability check (nexus-core)
        run: cd nexus-core && govulncheck ./...
      - name: Go vulnerability check (nexus-saas)
        run: cd nexus-saas && govulncheck ./...
      - name: Go vulnerability check (nexus-control-operators)
        run: cd nexus-control-operators && govulncheck ./...

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python dependency audit
        continue-on-error: true
        run: |
          pip install pip-audit
          cd nexus-ai-operators && pip-audit .

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Node dependency audit
        run: cd nexus-tower && npm audit --audit-level=critical

  docker-build:
    runs-on: ubuntu-latest
    needs: [nexus-core, nexus-saas, nexus-control-operators, nexus-ai-operators, nexus-tower]
    steps:
      - uses: actions/checkout@v4
      - name: Create .env from example
        run: cp .env.example .env
      - name: Build all images via docker compose
        run: docker compose build

  e2e:
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Create .env from example
        run: cp .env.example .env
      - name: Run e2e tests
        run: make e2e
      - name: Run JWT e2e tests
        run: make e2e-jwt
      - name: Run e2e operators
        run: make e2e-operators
      - name: Run e2e AI operators
        run: bash scripts/e2e/07_ai_operators.sh
      - name: Cleanup
        if: always()
        run: docker compose down -v || true
