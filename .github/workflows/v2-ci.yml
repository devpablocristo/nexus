name: V2 CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/v2-ci.yml"
      - "v2/**"
  pull_request:
    paths:
      - ".github/workflows/v2-ci.yml"
      - "v2/**"

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests + QA
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: v2/go.work
          cache-dependency-path: |
            v2/go.work.sum
            v2/pkgs/go-pkg/go.sum
            v2/data-plane/go.sum
            v2/control-plane/go.sum
            v2/control-workers/go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          install-mode: binary
          verify: false
          working-directory: v2/data-plane
          args: --version

      - name: Run tests
        working-directory: v2
        run: make test

      - name: Run tests with race detection
        working-directory: v2
        run: |
          cd pkgs/go-pkg && go test -race ./...
          cd ../../data-plane && go test -race ./...
          cd ../control-plane && go test -race ./...
          cd ../control-workers && go test -race ./...

      - name: Run QA checks
        working-directory: v2
        run: make qa

  smoke:
    name: Smoke tests (in-process)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: v2/go.work
          cache-dependency-path: |
            v2/go.work.sum
            v2/pkgs/go-pkg/go.sum
            v2/data-plane/go.sum
            v2/control-plane/go.sum
            v2/control-workers/go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run acceptance (smoke + e2e in-process)
        working-directory: v2
        run: make acceptance

  compose:
    name: Full-stack compose tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose version

      - name: Build and start services
        working-directory: v2
        run: make up
        timeout-minutes: 10

      - name: Verify all services healthy
        working-directory: v2
        run: |
          for service in nexus-data-plane nexus-control-plane nexus-control-workers; do
            status=$(docker compose ps ${service} --format "{{.Health}}")
            if [[ "${status}" != "healthy" ]]; then
              echo "FAIL: ${service} is ${status}"
              docker compose logs ${service} --tail=20
              exit 1
            fi
            echo "OK: ${service} is healthy"
          done

      - name: Run observability smoke
        working-directory: v2
        run: make smoke-observability

      - name: Run persistence smoke
        working-directory: v2
        run: make smoke-persistence

      - name: Teardown
        if: always()
        working-directory: v2
        run: make down
