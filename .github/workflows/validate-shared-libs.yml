name: validate-shared-libs

# Valida que las últimas versiones publicadas de @devpablocristo/* no rompan
# el build del console. Corre diariamente como early-warning ante breaking
# changes en core/modules. Parte del audit core+modules 2026-05-15 (MP-05).

on:
  schedule:
    - cron: "0 12 * * 1-5"  # weekdays 9am Buenos Aires
  workflow_dispatch:

permissions:
  contents: read

jobs:
  console-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
          registry-url: "https://registry.npmjs.org"

      - name: Force latest @devpablocristo/* versions
        run: |
          for pkg in $(node -e "
            const p = require('./package.json');
            const deps = {...p.dependencies, ...p.devDependencies};
            Object.keys(deps).filter(k => k.startsWith('@devpablocristo/')).forEach(k => console.log(k));
          "); do
            echo "::group::Bumping ${pkg}"
            npm install --no-save "${pkg}@latest"
            echo "::endgroup::"
          done

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
