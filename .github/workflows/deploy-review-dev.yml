name: Deploy Nexus Review DEV (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - "v3/review/**"
      - ".github/workflows/deploy-review-dev.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Rama o ref a desplegar (default: main)"
        required: false
        default: "main"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-nexus-review-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      IMAGE_NAME: nexus-review
      SERVICE_NAME: nexus-review
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_DEV }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_DEV }}
      DB_USER: postgres
      DB_NAME: nexus_review
      SECRET_DB_PASSWORD_NAME: nexus-db-password
      SECRET_API_KEYS_NAME: nexus-api-keys
      SECRET_SIGNING_KEY_NAME: nexus-signing-key
      SECRET_CALLBACK_TOKEN_NAME: nexus-callback-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build y push imagen
        env:
          IMAGE_TAG: ${{ github.sha }}
        working-directory: v3/review
        run: |
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Resolve DB password for DATABASE_URL
        run: |
          db_password="$(gcloud secrets versions access latest --project="$GCP_PROJECT_ID" --secret="$SECRET_DB_PASSWORD_NAME")"
          if [[ -z "$db_password" ]]; then
            echo "::error::No se pudo resolver $SECRET_DB_PASSWORD_NAME"
            exit 1
          fi
          echo "::add-mask::$db_password"
          export DB_PASSWORD="$db_password"
          db_password_enc="$(python3 -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['DB_PASSWORD'], safe=''))")"
          # Cloud Run conecta a Cloud SQL vía unix socket: /cloudsql/<instance-connection>
          database_url="postgres://${DB_USER}:${db_password_enc}@/${DB_NAME}?host=/cloudsql/${CLOUDSQL_INSTANCE}"
          echo "::add-mask::$database_url"
          echo "DATABASE_URL=$database_url" >> "$GITHUB_ENV"

      - name: Deploy a Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="APPROVAL_DEFAULT_TTL=3600,DATABASE_URL=${DATABASE_URL}" \
            --set-secrets="NEXUS_API_KEYS=${SECRET_API_KEYS_NAME}:latest,NEXUS_SIGNING_KEY=${SECRET_SIGNING_KEY_NAME}:latest,REVIEW_CALLBACK_TOKEN=${SECRET_CALLBACK_TOKEN_NAME}:latest" \
            --allow-unauthenticated \
            --port=8080 \
            --min-instances=0 \
            --max-instances=3

      - name: Resolve service URL
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "::error::no se pudo resolver service URL"
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"
          echo "Service URL: $service_url"

      - name: Smoke check
        run: |
          # /healthz queda interceptado por el frontend de Cloud Run; usamos /readyz.
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/readyz" || true)
            if [[ "$code" == "200" ]]; then
              echo "readyz OK"
              exit 0
            fi
            echo "attempt $i: readyz code=$code, retrying in 3s..."
            sleep 3
          done
          echo "::error::readyz no respondió 200 tras reintentos"
          exit 1
