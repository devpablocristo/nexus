name: V2 Infra Validate

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/v2-infra-validate.yml"
      - "v2/infra/**"
  pull_request:
    paths:
      - ".github/workflows/v2-infra-validate.yml"
      - "v2/infra/**"

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Terraform fmt
        run: terraform fmt -check -recursive v2/infra

      - name: Terraform init
        working-directory: v2/infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: v2/infra
        run: terraform validate
