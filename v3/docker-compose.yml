services:
  governance-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_governance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${NEXUS_POSTGRES_PORT:-15434}:5432"
    volumes:
      - governance-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_governance"]
      interval: 2s
      timeout: 3s
      retries: 30

  nexus:
    build:
      context: ./nexus
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@governance-postgres:5432/nexus_governance?sslmode=disable"
      NEXUS_API_KEYS: "admin=${NEXUS_ADMIN_API_KEY:-nexus-admin-dev-key}|service_principal=true|scopes=nexus:requests:read+nexus:requests:write+nexus:requests:result+nexus:approvals:decide+nexus:policies:admin+nexus:evidence:write+nexus:cross_org,prometheus=${NEXUS_PROMETHEUS_API_KEY:-nexus-prometheus-dev-key}|scopes=nexus:requests:read,ponti=${NEXUS_PONTI_API_KEY:-nexus-ponti-dev-key}|service_principal=true|scopes=nexus:requests:read+nexus:requests:write+nexus:requests:result+nexus:evidence:write"
      NEXUS_AUTH_ISSUER_URL: "${NEXUS_AUTH_ISSUER_URL:-}"
      NEXUS_AUTH_AUDIENCE: "${NEXUS_AUTH_AUDIENCE:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      APPROVAL_DEFAULT_TTL: "${NEXUS_APPROVAL_TTL:-3600}"
      NEXUS_SIGNING_KEY: "${NEXUS_SIGNING_KEY:-nexus-dev-signing-key-change-in-production}"
    ports:
      - "${NEXUS_PORT:-18084}:8080"
    depends_on:
      governance-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  console:
    build:
      context: ./console
    restart: unless-stopped
    environment:
      NEXUS_PROXY_API_KEY: "${NEXUS_ADMIN_API_KEY:-nexus-admin-dev-key}"
    ports:
      - "${NEXUS_CONSOLE_PORT:-13001}:80"
    depends_on:
      nexus:
        condition: service_healthy
