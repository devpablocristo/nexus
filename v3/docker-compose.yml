services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_review
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${NEXUS_POSTGRES_PORT:-15434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_review"]
      interval: 2s
      timeout: 3s
      retries: 30

  review:
    build:
      context: ../../
      dockerfile: nexus/v3/review/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/nexus_review?sslmode=disable"
      NEXUS_API_KEYS: "admin=${NEXUS_REVIEW_ADMIN_API_KEY:-nexus-review-admin-dev-key},prometheus=${NEXUS_REVIEW_PROMETHEUS_API_KEY:-nexus-review-prometheus-dev-key}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      APPROVAL_DEFAULT_TTL: "${NEXUS_REVIEW_APPROVAL_TTL:-3600}"
      NEXUS_SIGNING_KEY: "${NEXUS_SIGNING_KEY:-nexus-dev-signing-key-change-in-production}"
    ports:
      - "${NEXUS_REVIEW_PORT:-18084}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  companion:
    build:
      context: ../../
      dockerfile: nexus/v3/companion/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/nexus_companion?sslmode=disable"
      NEXUS_API_KEYS: "admin=${NEXUS_COMPANION_ADMIN_API_KEY:-nexus-companion-admin-dev-key}"
      REVIEW_BASE_URL: "http://review:8080"
      REVIEW_API_KEY: "${NEXUS_REVIEW_ADMIN_API_KEY:-nexus-review-admin-dev-key}"
      COMPANION_REVIEW_SYNC_INTERVAL_SEC: "${COMPANION_REVIEW_SYNC_INTERVAL_SEC:-30}"
      PYMES_BASE_URL: "${PYMES_BASE_URL:-}"
      PYMES_API_KEY: "${PYMES_API_KEY:-}"
      COMPANION_WATCHER_INTERVAL_SEC: "${COMPANION_WATCHER_INTERVAL_SEC:-0}"
    ports:
      - "${NEXUS_COMPANION_PORT:-18085}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      review:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  console:
    build:
      context: ./console
    restart: unless-stopped
    ports:
      - "${NEXUS_CONSOLE_PORT:-13001}:80"
    depends_on:
      review:
        condition: service_healthy
      companion:
        condition: service_healthy

volumes:
  postgres-data:
