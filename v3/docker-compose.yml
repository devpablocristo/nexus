services:
  review-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_review
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${NEXUS_POSTGRES_PORT:-15434}:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - review-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_review"]
      interval: 2s
      timeout: 3s
      retries: 30

  review:
    build:
      context: ./review
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@review-postgres:5432/nexus_review?sslmode=disable"
      NEXUS_API_KEYS: "admin=${NEXUS_REVIEW_ADMIN_API_KEY:-nexus-review-admin-dev-key}|service_principal=true|scopes=nexus:requests:read+nexus:requests:write+nexus:requests:result+nexus:approvals:decide+nexus:policies:admin+nexus:evidence:write+nexus:cross_org,prometheus=${NEXUS_REVIEW_PROMETHEUS_API_KEY:-nexus-review-prometheus-dev-key}|scopes=nexus:requests:read,ponti=${NEXUS_REVIEW_PONTI_API_KEY:-nexus-review-ponti-dev-key}|service_principal=true|scopes=nexus:requests:read+nexus:requests:write+nexus:requests:result+nexus:evidence:write"
      NEXUS_AUTH_ISSUER_URL: "${NEXUS_AUTH_ISSUER_URL:-}"
      NEXUS_AUTH_AUDIENCE: "${NEXUS_AUTH_AUDIENCE:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      APPROVAL_DEFAULT_TTL: "${NEXUS_REVIEW_APPROVAL_TTL:-3600}"
      NEXUS_SIGNING_KEY: "${NEXUS_SIGNING_KEY:-nexus-dev-signing-key-change-in-production}"
    ports:
      - "${NEXUS_REVIEW_PORT:-18084}:8080"
    depends_on:
      review-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  companion:
    build:
      context: ./companion
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@review-postgres:5432/nexus_companion?sslmode=disable"
      NEXUS_API_KEYS: "admin=${NEXUS_COMPANION_ADMIN_API_KEY:-nexus-companion-admin-dev-key}|service_principal=true|scopes=companion:tasks:read+companion:tasks:write+companion:connectors:execute+companion:connectors:admin"
      NEXUS_AUTH_ISSUER_URL: "${NEXUS_AUTH_ISSUER_URL:-}"
      NEXUS_AUTH_AUDIENCE: "${NEXUS_AUTH_AUDIENCE:-}"
      REVIEW_BASE_URL: "http://review:8080"
      REVIEW_API_KEY: "${NEXUS_REVIEW_ADMIN_API_KEY:-nexus-review-admin-dev-key}"
      COMPANION_REVIEW_SYNC_INTERVAL_SEC: "${COMPANION_REVIEW_SYNC_INTERVAL_SEC:-30}"
      PYMES_BASE_URL: "${PYMES_BASE_URL:-}"
      PYMES_API_KEY: "${PYMES_API_KEY:-}"
      COMPANION_WATCHER_INTERVAL_SEC: "${COMPANION_WATCHER_INTERVAL_SEC:-0}"
      NEXUS_LLM_PROVIDER: "${NEXUS_LLM_PROVIDER:-echo}"
      NEXUS_LLM_API_KEY: "${NEXUS_LLM_API_KEY:-}"
      NEXUS_LLM_MODEL: "${NEXUS_LLM_MODEL:-qwen2.5:3b}"
    ports:
      - "${NEXUS_COMPANION_PORT:-18085}:8080"
    depends_on:
      review-postgres:
        condition: service_healthy
      review:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  console:
    build:
      context: ./console
    restart: unless-stopped
    environment:
      NEXUS_REVIEW_PROXY_API_KEY: "${NEXUS_REVIEW_ADMIN_API_KEY:-nexus-review-admin-dev-key}"
      NEXUS_COMPANION_PROXY_API_KEY: "${NEXUS_COMPANION_ADMIN_API_KEY:-nexus-companion-admin-dev-key}"
    ports:
      - "${NEXUS_CONSOLE_PORT:-13001}:80"
    depends_on:
      review:
        condition: service_healthy
      companion:
        condition: service_healthy

  ollama:
    image: ollama/ollama:0.5.7
    profiles:
      - ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  review-postgres-data:
  ollama-data:
