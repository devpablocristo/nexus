server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas las rutas al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Companion (prefijo /companion → upstream /v1/...)
    location /companion/ {
        proxy_pass http://companion:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API Review
    location /v1/ {
        proxy_pass http://review:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /healthz {
        proxy_pass http://review:8080;
    }

    location /readyz {
        proxy_pass http://review:8080;
    }
}
