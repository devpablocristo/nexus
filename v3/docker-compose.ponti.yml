services:
  # ============================================================
  # ponti-backend + su DB
  # ============================================================
  ponti-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: new_ponti_db_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${PONTI_POSTGRES_PORT:-5433}:5432"
    volumes:
      - ponti-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d new_ponti_db_dev"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  ponti-backend:
    build:
      context: ${PONTI_BACKEND_DIR:-/home/pablo/Projects/Pablo/ponti/ponti-backend}
      dockerfile: Dockerfile.dev
    depends_on:
      ponti-postgres:
        condition: service_healthy
      nexus:
        condition: service_healthy
    environment:
      HTTP_SERVER_NAME: http-server
      HTTP_SERVER_HOST: 0.0.0.0
      HTTP_SERVER_PORT: "8080"
      API_VERSION: v1
      SERVICE_NAME: ponti-api
      SERVICE_VERSION: "1.0"
      SERVICE_MAX_RETRIES: "5"
      X_API_KEY: abc123secreta
      AUTH_ENABLED: "false"
      IDENTITY_JWKS_URL: https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com
      IDENTITY_JWKS_CACHE_TTL_SECONDS: "300"
      TENANT_HEADER_NAME: X-Tenant-Id
      AUTH_AUTO_PROVISION_MEMBERSHIP: "true"
      AUTH_DEFAULT_TENANT_NAME: default
      AUTH_DEFAULT_ROLE_NAME: admin
      DB_TYPE: postgres
      DB_USER: admin
      DB_PASSWORD: admin
      DB_HOST: ponti-postgres
      DB_NAME: new_ponti_db_dev
      DB_SSL_MODE: disable
      DB_PORT: "5432"
      MIGRATIONS_DIR: file://migrations_v4
      WORDS_SUGGESTER_LIMIT: "100"
      WORDS_SUGGESTER_THRESHOLD: "0.3"
      AI_SERVICE_URL: http://ponti-ai:8090
      AI_SERVICE_KEY: servicekey123
      AI_SERVICE_TIMEOUT_MS: "300000"
      # Nexus (intra-red: nexus es el servicio de governance en nexus/v3/docker-compose.yml)
      REVIEW_URL: http://nexus:8080
      REVIEW_API_KEY: ${NEXUS_PONTI_API_KEY:-nexus-ponti-dev-key}
      REVIEW_SYNC_COOLDOWN_SEC: "60"
      GO_MODULES_TOKEN: ${GO_MODULES_TOKEN:-}
    ports:
      - "${PONTI_BACKEND_PORT:-8080}:8080"
    volumes:
      - ${PONTI_BACKEND_DIR:-/home/pablo/Projects/Pablo/ponti/ponti-backend}:/app
      - ${CORE_REPO_DIR:-/home/pablo/Projects/Pablo/core}:/home/pablo/Projects/Pablo/core
      - ponti-backend-go-modules:/go/pkg/mod
      - ponti-backend-go-cache:/root/.cache/go-build
    restart: unless-stopped

  # ============================================================
  # ponti-ai + su DB
  # ============================================================
  ai-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ponti_ai
    ports:
      - "${AI_DB_PORT:-5435}:5432"
    volumes:
      - ai-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ponti_ai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ai-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      ai-db:
        condition: service_healthy
    volumes:
      - ${PONTI_AI_DIR:-/home/pablo/Projects/Pablo/ponti/ponti-ai}/migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgresql://postgres:postgres@ai-db:5432/ponti_ai?sslmode=disable", "up"]
    restart: "no"

  ponti-ai:
    build:
      context: ${PONTI_AI_DIR:-/home/pablo/Projects/Pablo/ponti/ponti-ai}
      dockerfile: Dockerfile
    depends_on:
      ai-db:
        condition: service_healthy
    env_file:
      - ${PONTI_AI_DIR:-/home/pablo/Projects/Pablo/ponti/ponti-ai}/.env
    environment:
      # Reutilizar ADC del host para Vertex AI
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
      # Override: la DB vive en ai-db dentro de esta red
      DB_DSN: postgresql://postgres:postgres@ai-db:5432/ponti_ai?sslmode=disable
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    ports:
      - "${PONTI_AI_PORT:-8090}:8090"
    restart: unless-stopped

  # ============================================================
  # ponti-frontend (BFF + UI)
  # Cada servicio node tiene su propio yarn-cache interno (no compartido)
  # para evitar problemas de permisos cuando uid del container difiere.
  # ============================================================
  ponti-bff:
    image: node:20.19.0
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    command: sh -c "if [ ! -f node_modules/.yarn-integrity ]; then yarn install --frozen-lockfile --network-timeout 600000 --network-concurrency 1; fi && yarn dev"
    ports:
      - "${PONTI_BFF_PORT:-3000}:3000"
    volumes:
      - ${PONTI_FRONTEND_DIR:-/home/pablo/Projects/Pablo/ponti/ponti-frontend}/api:/app
      - ponti-bff-node-modules:/app/node_modules
    tmpfs:
      - /home/node/.yarn
    env_file:
      - ${PONTI_FRONTEND_DIR:-/home/pablo/Projects/Pablo/ponti/ponti-frontend}/api/.env
    environment:
      NODE_ENV: development
      BFF_VERBOSE_ERRORS: "true"
      YARN_CACHE_FOLDER: /home/node/.yarn
      HOME: /home/node
      BASE_MANAGER_API: http://ponti-backend:8080/api/v1
    depends_on:
      ponti-backend:
        condition: service_started
    restart: unless-stopped

  ponti-ui:
    image: node:20.19.0
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    command: sh -c "if [ ! -f node_modules/.yarn-integrity ] || [ ! -d node_modules/@devpablocristo/core-authn ]; then yarn install --frozen-lockfile --network-timeout 600000 --network-concurrency 1; fi && yarn dev --host 0.0.0.0"
    ports:
      - "${PONTI_UI_PORT:-5173}:5173"
    volumes:
      - ${PONTI_FRONTEND_DIR:-/home/pablo/Projects/Pablo/ponti/ponti-frontend}/ui:/app
      - ponti-ui-node-modules:/app/node_modules
      - ponti-ui-yarn-cache:/home/node/.yarn
    environment:
      BFF_URL: http://ponti-bff:3000
      YARN_CACHE_FOLDER: /home/node/.yarn
      HOME: /home/node
    depends_on:
      - ponti-bff
    restart: unless-stopped

volumes:
  ponti-postgres-data:
  ponti-backend-go-modules:
  ponti-backend-go-cache:
  ai-db-data:
  ponti-bff-node-modules:
  ponti-bff-yarn-cache:
  ponti-ui-node-modules:
  ponti-ui-yarn-cache:
