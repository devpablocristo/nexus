services:
  review:
    build:
      context: ../../
      dockerfile: nexus/v3/review/Dockerfile.dev
    working_dir: /workspace/nexus/v3/review
    volumes:
      - ./review:/workspace/nexus/v3/review
    command: ["air", "-c", ".air.toml"]

  companion:
    build:
      context: ../../
      dockerfile: nexus/v3/companion/Dockerfile.dev
    working_dir: /workspace/nexus/v3/companion
    volumes:
      - ./companion:/workspace/nexus/v3/companion
    command: ["air", "-c", ".air.toml"]

  console:
    build:
      context: ./console
      dockerfile: Dockerfile.dev
    environment:
      NEXUS_REVIEW_PROXY_TARGET: "http://review:8080"
      NEXUS_COMPANION_PROXY_TARGET: "http://companion:8080"
      NEXUS_REVIEW_PROXY_API_KEY: "${NEXUS_REVIEW_ADMIN_API_KEY:-nexus-review-admin-dev-key}"
      NEXUS_COMPANION_PROXY_API_KEY: "${NEXUS_COMPANION_ADMIN_API_KEY:-nexus-companion-admin-dev-key}"
    volumes:
      - ./console/src:/app/src
      - ./console/index.html:/app/index.html
      - ./console/vite.config.js:/app/vite.config.js
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "80"]
