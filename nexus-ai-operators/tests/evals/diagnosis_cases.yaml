cases:
  - name: diagnosis_safe_summary
    prompt_id: diagnosis_system
    backend: anthropic
    query: What is the likely issue?
    latest_summary: "High-risk signal handled: severity=CRIT, deny_ratio=0.90."
    llm_text: "The confirmed context shows a critical deny ratio spike. The likely cause still requires more evidence."
    expect_summary_contains: critical deny ratio spike
    expect_fallback_used: false
    expect_guardrail: []
  - name: diagnosis_invents_execution
    prompt_id: diagnosis_system
    backend: anthropic
    query: What happened?
    latest_summary: No actions recorded yet.
    llm_text: We already executed a rollback and disabled enforcement.
    expect_summary_contains: deterministic fallback mode
    expect_fallback_used: true
    expect_guardrail:
      - execution_claim
      - bypass_suggestion
