name: ci

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - name: Unit tests
        run: go test ./...

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - name: Install e2e dependencies
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep
      - name: Prepare env
        run: cp .env.example .env
      - name: Smoke up + migrate + seed
        run: |
          docker compose up --build -d
          make migrate-up
          make seed
      - name: Smoke assertions
        run: |
          curl -fsS http://localhost:8080/healthz | jq -e '.ok==true'
          test "$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:8080/readyz)" = "200"
          test "$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:8080/admin)" = "200"
          curl -fsS http://localhost:8080/metrics | rg -q "nexus_run_total_prom|nexus_gateway_req_count"
      - name: Teardown
        if: always()
        run: docker compose down -v

  quickstart-admin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - name: Install quickstart dependencies
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep
      - name: Quickstart admin
        run: make quickstart-admin
      - name: Teardown
        if: always()
        run: docker compose down -v

  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - name: Install e2e dependencies
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep
      - name: Prepare env
        run: cp .env.example .env
      - name: QA
        run: make qa
      - name: Teardown
        if: always()
        run: docker compose down -v

  jwt-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - name: Install e2e dependencies
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep
      - name: Prepare env
        run: cp .env.example .env
      - name: JWT E2E
        run: make jwt-e2e
      - name: Teardown
        if: always()
        run: docker compose down -v
