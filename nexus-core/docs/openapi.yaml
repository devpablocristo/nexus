components:
  securitySchemes:
    NexusApiKey:
      type: apiKey
      in: header
      name: X-NEXUS-CORE-KEY
      description: Tenant API key (stored hashed in DB).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Optional JWT+JWKS auth mode when enabled by feature flags.

  parameters:
    ToolNamePath:
      name: name
      in: path
      required: true
      schema:
        type: string
    XNexusActor:
      name: X-NEXUS-ACTOR
      in: header
      required: false
      schema:
        type: string
      description: Delegated actor identifier for audit/policy context.
    XNexusRole:
      name: X-NEXUS-ROLE
      in: header
      required: false
      schema:
        type: string
      description: Delegated role for policy context.
    XNexusScopes:
      name: X-NEXUS-SCOPES
      in: header
      required: false
      schema:
        type: string
      description: Comma-separated scopes; intersected with key/JWT scopes.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 255
      description: |
        Idempotency key for WRITE tool executions. `FAILED` records are terminal; retry requires a new key.
    TimeoutMs:
      name: X-Timeout-Ms
      in: header
      required: false
      schema:
        type: integer
        minimum: 1000
        maximum: 30000
      description: End-to-end timeout budget in milliseconds (clamped by server config).
    AuditToolName:
      name: tool_name
      in: query
      schema:
        type: string
    AuditDecision:
      name: decision
      in: query
      schema:
        type: string
        enum: [allow, deny]
    AuditStatus:
      name: status
      in: query
      schema:
        type: string
        enum: [success, error, blocked]
    AuditFrom:
      name: from
      in: query
      schema:
        type: string
        format: date-time
    AuditTo:
      name: to
      in: query
      schema:
        type: string
        format: date-time
    AuditLimit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    AuditExportFormat:
      name: format
      in: query
      schema:
        type: string
        enum: [jsonl, csv]
        default: jsonl

  schemas:
    ErrorObject:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required: [code, message]

    ErrorResponse:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
        error:
          $ref: "#/components/schemas/ErrorObject"
      required: [request_id, error]

    IdempotencyMeta:
      type: object
      properties:
        present:
          type: boolean
        outcome:
          type: string
          enum: [NEW, REPLAY, IN_PROGRESS, CONFLICT, MISSING_REQUIRED, SKIPPED_NOT_WRITE]
      required: [present, outcome]

    RunRequest:
      type: object
      properties:
        request_id:
          type: string
        tool_name:
          type: string
        input:
          type: object
          additionalProperties: true
        context:
          type: object
          additionalProperties: true
      required: [tool_name, input]

    A2ACallRequest:
      type: object
      properties:
        request_id:
          type: string
        tool_name:
          type: string
        input:
          type: object
          additionalProperties: true
        context:
          type: object
          additionalProperties: true
        timeout_ms:
          type: integer
          minimum: 1000
          maximum: 30000
        idempotency_key:
          type: string
          minLength: 1
          maxLength: 255
      required: [tool_name, input]

    A2ACallResponse:
      type: object
      properties:
        request_id:
          type: string
        decision:
          type: string
          enum: [allow, deny]
        tool_name:
          type: string
        status:
          type: string
          enum: [success, blocked, error]
        reason:
          type: string
        result:
          type: object
          additionalProperties: true
          nullable: true
        error:
          $ref: "#/components/schemas/ErrorObject"
        latency_ms:
          type: integer
        idempotency:
          $ref: "#/components/schemas/IdempotencyMeta"
      required: [request_id, decision, tool_name, status, error, latency_ms]

    RunSuccessResponse:
      type: object
      properties:
        request_id:
          type: string
        decision:
          type: string
          enum: [allow]
        tool_name:
          type: string
        status:
          type: string
          enum: [success]
        result:
          type: object
          additionalProperties: true
          nullable: true
        latency_ms:
          type: integer
        idempotency:
          $ref: "#/components/schemas/IdempotencyMeta"
      required: [request_id, decision, tool_name, status, latency_ms]

    RunBlockedResponse:
      type: object
      properties:
        request_id:
          type: string
        decision:
          type: string
          enum: [deny]
        status:
          type: string
          enum: [blocked]
        reason:
          type: string
        error:
          $ref: "#/components/schemas/ErrorObject"
        latency_ms:
          type: integer
        idempotency:
          $ref: "#/components/schemas/IdempotencyMeta"
      required: [request_id, decision, status, reason, error, latency_ms]

    RunErrorResponse:
      type: object
      properties:
        request_id:
          type: string
        decision:
          type: string
          enum: [allow]
        status:
          type: string
          enum: [error]
        error:
          $ref: "#/components/schemas/ErrorObject"
        latency_ms:
          type: integer
        idempotency:
          $ref: "#/components/schemas/IdempotencyMeta"
      required: [request_id, decision, status, error, latency_ms]

    SimulateRequest:
      allOf:
        - $ref: "#/components/schemas/RunRequest"

    SimulateResponse:
      type: object
      properties:
        request_id:
          type: string
        decision:
          type: string
          enum: [allow, deny]
        tool_name:
          type: string
        status:
          type: string
          enum: [success, error, blocked]
        reason:
          type: string
        error:
          $ref: "#/components/schemas/ErrorObject"
        explain:
          type: object
          additionalProperties: true
        latency_ms:
          type: integer
      required: [request_id, decision, tool_name, status, explain, latency_ms]

    Tool:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
          enum: [http]
        description:
          type: string
          nullable: true
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        url:
          type: string
        input_schema:
          type: object
          additionalProperties: true
        output_schema:
          type: object
          additionalProperties: true
          nullable: true
        action_type:
          type: string
          enum: [read, write]
        classification:
          type: string
          enum: [internal, external]
        sensitivity:
          type: string
          enum: [low, medium, high]
        risk_level:
          type: integer
          minimum: 1
          maximum: 5
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - kind
        - method
        - url
        - input_schema
        - action_type
        - classification
        - sensitivity
        - risk_level
        - enabled
        - created_at
        - updated_at

    ToolCreateRequest:
      type: object
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [http]
        description:
          type: string
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        url:
          type: string
        input_schema:
          type: object
          additionalProperties: true
        output_schema:
          type: object
          additionalProperties: true
        action_type:
          type: string
          enum: [read, write]
        classification:
          type: string
          enum: [internal, external]
          default: internal
        sensitivity:
          type: string
          enum: [low, medium, high]
          default: low
        risk_level:
          type: integer
          minimum: 1
          maximum: 5
        enabled:
          type: boolean
      required: [name, kind, method, url, input_schema, action_type, risk_level, enabled]

    ToolUpdateRequest:
      type: object
      properties:
        description:
          type: string
          nullable: true
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        url:
          type: string
        input_schema:
          type: object
          additionalProperties: true
        output_schema:
          type: object
          additionalProperties: true
          nullable: true
        action_type:
          type: string
          enum: [read, write]
        classification:
          type: string
          enum: [internal, external]
        sensitivity:
          type: string
          enum: [low, medium, high]
        risk_level:
          type: integer
          minimum: 1
          maximum: 5
        enabled:
          type: boolean

    ToolListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Tool"
      required: [items]

    Policy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tool_id:
          type: string
          format: uuid
        effect:
          type: string
          enum: [allow, deny]
        priority:
          type: integer
        conditions:
          type: object
          additionalProperties: true
        limits:
          type: object
          additionalProperties: true
        reason_template:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, tool_id, effect, priority, conditions, limits, reason_template, enabled, created_at, updated_at]

    PolicyCreateRequest:
      type: object
      properties:
        effect:
          type: string
          enum: [allow, deny]
        priority:
          type: integer
        conditions:
          type: object
          additionalProperties: true
        limits:
          type: object
          additionalProperties: true
        reason_template:
          type: string
        enabled:
          type: boolean
      required: [effect, priority, conditions, limits, reason_template, enabled]

    PolicyUpdateRequest:
      type: object
      properties:
        effect:
          type: string
          enum: [allow, deny]
        priority:
          type: integer
        conditions:
          type: object
          additionalProperties: true
        limits:
          type: object
          additionalProperties: true
        reason_template:
          type: string
        enabled:
          type: boolean

    PolicyListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Policy"
      required: [items]

    AuditEvent:
      type: object
      properties:
        request_id:
          type: string
        org_id:
          type: string
          format: uuid
        tool_name:
          type: string
        actor:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        scopes:
          type: array
          items:
            type: string
        decision:
          type: string
          enum: [allow, deny]
        status:
          type: string
          enum: [success, error, blocked]
        reason:
          type: string
          nullable: true
        latency_ms:
          type: integer
        idempotency_present:
          type: boolean
        idempotency_outcome:
          type: string
        timeout_ms:
          type: integer
          nullable: true
        budget_remaining_ms_at_execute:
          type: integer
          nullable: true
        stage_durations_ms:
          type: object
          additionalProperties:
            type: integer
            format: int64
        created_at:
          type: string
          format: date-time
        input:
          type: object
          additionalProperties: true
          nullable: true
        context:
          type: object
          additionalProperties: true
          nullable: true
        output:
          type: object
          additionalProperties: true
          nullable: true
        dlp_summary:
          type: object
          additionalProperties: true
          nullable: true
        error:
          $ref: "#/components/schemas/ErrorObject"
        prev_event_hash:
          type: string
          nullable: true
        event_hash:
          type: string
          nullable: true
        hash_algo:
          type: string
      required: [request_id, tool_name, decision, status, latency_ms, created_at]

    AuditListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
      required: [items]

    SecretUpsertRequest:
      type: object
      properties:
        secret_type:
          type: string
          enum: [header, bearer]
        key_name:
          type: string
        value:
          type: string
          description: Plaintext provided by caller; encrypted at rest server-side.
        enabled:
          type: boolean
      required: [secret_type, value]

    SecretMetadataResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        secret_type:
          type: string
          enum: [header, bearer]
        key_name:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, secret_type, key_name, enabled, created_at, updated_at]

    EgressRule:
      type: object
      properties:
        host:
          type: string
        enabled:
          type: boolean
      required: [host]

    JSONRPCRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          type: string
        method:
          type: string
          enum: [tools/list, tools/get, tools/call]
        params:
          type: object
          additionalProperties: true
      required: [jsonrpc, id, method, params]

    JSONRPCError:
      type: object
      properties:
        code:
