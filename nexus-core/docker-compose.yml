services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: nexus
    ports:
      - "${NEXUS_POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "${NEXUS_REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  nexus-core:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NEXUS_DATABASE_URL: "${NEXUS_DATABASE_URL}"
      NEXUS_HTTP_TIMEOUT_MS: "${NEXUS_HTTP_TIMEOUT_MS}"
      NEXUS_HTTP_MAX_RESPONSE_BYTES: "${NEXUS_HTTP_MAX_RESPONSE_BYTES}"
      NEXUS_MAX_BODY_BYTES: "${NEXUS_MAX_BODY_BYTES}"
      NEXUS_LOG_LEVEL: "${NEXUS_LOG_LEVEL}"
      NEXUS_RATE_LIMIT_DEFAULT_PER_MINUTE: "${NEXUS_RATE_LIMIT_DEFAULT_PER_MINUTE}"
      NEXUS_RATE_LIMIT_BACKEND: "${NEXUS_RATE_LIMIT_BACKEND}"
      NEXUS_REDIS_URL: "${NEXUS_REDIS_URL}"
      NEXUS_SWAGGER_CDN: "${NEXUS_SWAGGER_CDN}"
      NEXUS_MASTER_KEY: "${NEXUS_MASTER_KEY}"
      NEXUS_AUTH_ALLOW_API_KEY: "${NEXUS_AUTH_ALLOW_API_KEY}"
      NEXUS_AUTH_ENABLE_JWT: "${NEXUS_AUTH_ENABLE_JWT}"
      NEXUS_JWKS_URL: "${NEXUS_JWKS_URL}"
      NEXUS_JWT_ISSUER: "${NEXUS_JWT_ISSUER}"
      NEXUS_JWT_AUDIENCE: "${NEXUS_JWT_AUDIENCE}"
      NEXUS_JWT_ORG_CLAIM: "${NEXUS_JWT_ORG_CLAIM}"
      NEXUS_JWT_ROLE_CLAIM: "${NEXUS_JWT_ROLE_CLAIM}"
      NEXUS_JWT_SCOPES_CLAIM: "${NEXUS_JWT_SCOPES_CLAIM}"
      NEXUS_JWT_ACTOR_CLAIM: "${NEXUS_JWT_ACTOR_CLAIM}"
      NEXUS_OTEL_ENABLED: "${NEXUS_OTEL_ENABLED}"
      NEXUS_OTEL_SERVICE_NAME: "${NEXUS_OTEL_SERVICE_NAME}"
      NEXUS_OTLP_ENDPOINT: "${NEXUS_OTLP_ENDPOINT}"
      NEXUS_OTLP_INSECURE: "${NEXUS_OTLP_INSECURE}"
      NEXUS_MIGRATIONS_DIR: "${NEXUS_MIGRATIONS_DIR}"
      NEXUS_DISABLE_SSRF_PROTECTION: "${NEXUS_DISABLE_SSRF_PROTECTION:-false}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${NEXUS_HTTP_PORT}:8080"
    command: ["/app/nexus-core"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks:
      default: {}

  mock-tools:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${NEXUS_MOCK_TOOLS_PORT}:8081"
    command: ["/app/mock-tools"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${NEXUS_PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      nexus-core:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${NEXUS_GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
