apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus.fullname" . }}-tower
  labels:
    {{- include "nexus.tower.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.tower.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus.tower.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.tower.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nexus.tower.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "nexus.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.tower.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: 15
      containers:
        - name: nexus-tower
          image: {{ include "nexus.tower.image" . }}
          imagePullPolicy: {{ .Values.tower.image.pullPolicy }}
          command: ["nginx", "-g", "daemon off;"]
          ports:
            - name: http
              containerPort: 4173
              protocol: TCP
          readinessProbe:
            httpGet:
              path: {{ .Values.tower.probes.readiness.path }}
              port: {{ .Values.tower.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.tower.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.tower.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.tower.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.tower.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.tower.probes.liveness.path }}
              port: {{ .Values.tower.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.tower.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.tower.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.tower.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.tower.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.tower.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.tower.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      {{- with .Values.tower.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tower.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tower.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
