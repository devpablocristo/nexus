{{- if .Values.postgres.internal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus.postgres.serviceName" . }}
  labels:
    {{- include "nexus.postgres.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "nexus.postgres.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nexus.fullname" . }}-postgres
  labels:
    {{- include "nexus.postgres.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "nexus.postgres.serviceName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "nexus.postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus.postgres.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.postgres.internal.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: "{{ .Values.postgres.internal.image.repository }}:{{ .Values.postgres.internal.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.internal.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.internal.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexus.secretName" . }}
                  key: NEXUS_DATABASE_URL
                  optional: true
            - name: POSTGRES_PASSWORD_DIRECT
              value: {{ .Values.postgres.internal.auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.internal.auth.database | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          {{/*
            Use the direct password; the secretKeyRef above is only for
            reference. We set POSTGRES_PASSWORD from the simple value.
          */}}
          command:
            - bash
            - -c
            - |
              export POSTGRES_PASSWORD="{{ .Values.postgres.internal.auth.password }}"
              exec docker-entrypoint.sh postgres
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.internal.auth.username | quote }}
                - -d
                - {{ .Values.postgres.internal.auth.database | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.internal.auth.username | quote }}
                - -d
                - {{ .Values.postgres.internal.auth.database | quote }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.postgres.internal.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.postgres.internal.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.internal.storage.storageClassName }}
        storageClassName: {{ .Values.postgres.internal.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.internal.storage.size }}
{{- end }}
