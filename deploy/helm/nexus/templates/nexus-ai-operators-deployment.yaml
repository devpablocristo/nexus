apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus.fullname" . }}-ai-operators
  labels:
    {{- include "nexus.operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus.operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.operator.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nexus.operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "nexus.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.operator.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: nexus-ai-operators
          image: {{ include "nexus.operator.image" . }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "nexus.configmapName" . }}
            - secretRef:
                name: {{ include "nexus.secretName" . }}
          readinessProbe:
            httpGet:
              path: {{ .Values.operator.probes.readiness.path }}
              port: {{ .Values.operator.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.operator.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.operator.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.operator.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.operator.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.operator.probes.liveness.path }}
              port: {{ .Values.operator.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.operator.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.operator.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.operator.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.operator.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.operator.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
