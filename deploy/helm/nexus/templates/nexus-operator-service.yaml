apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus.operator.serviceName" . }}
  labels:
    {{- include "nexus.operator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.operator.service.type }}
  ports:
    - port: {{ .Values.operator.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "nexus.operator.selectorLabels" . | nindent 4 }}
