apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexus.configmapName" . }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
data:
  # Derived service URLs for inter-component communication
  NEXUS_OPERATOR_URL: "http://{{ include "nexus.operator.serviceName" . }}:{{ .Values.operator.service.port }}"
  NEXUS_CORE_BASE_URL: "http://{{ include "nexus.core.serviceName" . }}:{{ .Values.core.service.port }}"
  OPERATOR_PORT: {{ .Values.operator.service.port | quote }}
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
